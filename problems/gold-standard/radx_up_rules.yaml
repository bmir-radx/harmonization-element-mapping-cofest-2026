- sources: [self_reported_height_coded, self_reported_height_feet, self_reported_height_inches,
    self_reported_height_meters, self_reported_height_centimeters]
  target: nih_height
  operations:
  - operation: case
    sources: [self_reported_height_coded, self_reported_height_feet, self_reported_height_inches,
      self_reported_height_meters, self_reported_height_centimeters]
    selector: self_reported_height_coded
    branches:
    - when: ['1']
      combine: sum
      terms:
      - source: self_reported_height_feet
        operations:
        - {operation: convert_units, source_unit: feet, target_unit: inch}
      - source: self_reported_height_inches
        operations: []
    - when: ['2']
      combine: sum
      terms:
      - source: self_reported_height_meters
        operations:
        - {operation: convert_units, source_unit: m, target_unit: inch}
      - source: self_reported_height_centimeters
        operations:
        - {operation: convert_units, source_unit: cm, target_unit: inch}
    default: null
  metadata: {cde: CDE12.2, concept: Health Status Height, program: RADx-UP, mapping_type: case,
    rationale: 'RADx-UP lets the respondent choose units (self_reported_height_coded:
      1=feet+inches, 2=meters+cm). The common `nih_height` is in inches: each branch
      converts its parts to inches and sums them. The unit flag selects the branch.'}

- sources: [self_reported_weight_units_2, self_reported_weight_lbs, self_reported_weight_kgs]
  target: nih_weight
  operations:
  - operation: case
    sources: [self_reported_weight_units_2, self_reported_weight_lbs, self_reported_weight_kgs]
    selector: self_reported_weight_units_2
    branches:
    - when: ['2']
      combine: null
      terms:
      - source: self_reported_weight_lbs
        operations:
        - {operation: do_nothing}
    - when: ['1']
      combine: null
      terms:
      - source: self_reported_weight_kgs
        operations:
        - {operation: convert_units, source_unit: kg, target_unit: lb}
        - {operation: round, precision: 0}
    default: null
  metadata: {cde: CDE12.3, concept: Health Status Weight, program: RADx-UP, mapping_type: case,
    rationale: 'RADx-UP lets the respondent choose units (self_reported_weight_units_2:
      1=kg, 2=lbs). The common `nih_weight` is in pounds: if pounds were used take
      the value as-is; if kilograms, convert to pounds. The unit flag selects the
      branch.'}
